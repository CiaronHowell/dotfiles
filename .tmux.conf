# Thanks to typecraft for base config: https://www.youtube.com/watch?v=jaI3Hcw-ZaA&list=PLsz00TDipIfdrJDjpULKY7mQlIFi4HjdR&index=2
set-option -g default-shell /bin/zsh

# Rebind r to resource the tmux config
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Keep window numbers contiguous when a window closes
set -g renumber-windows on

# Replace default prefix (C-b) to a more ergonomic keybind
set -g prefix C-s

# Allow resizing using the mouse (only if you're a filthy casual)
set -g mouse on

# Set nvim motion keys to traverse panes (fallback for vim-tmux-navigator)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

setw -g mode-keys vi

# Vi-style copy mode: v to begin selection, y to yank to the system clipboard
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Open panes at the current directory
bind-key '"' split-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# Toggle focus of current pane - mainly for when working on small screens e.g., laptops
bind-key Enter resize-pane -Z

set-option -g focus-events on

# True colour support and extended key sequences (e.g. Shift+Enter)
set -g default-terminal "tmux-256color"
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys:RGB'

# Reduces time for escape to be recognised as a normal keystroke
set-option -sg escape-time 10

# Bigger scrollback buffer (default is 2000 lines)
set -g history-limit 50000

# Tmux bar
set-option -g status-position top

# Using Tmux Package Manager (TPM) - make sure to clone repo
set -g @plugin 'tmux-plugins/tpm' # List of plugins
set -g @plugin 'catppuccin/tmux#v2.3.0' # Tmux theme, pinned to a release tag
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Catppuccin config (v2 syntax)
set -g @catppuccin_flavor "mocha"
# "custom" = use the window separators defined below. The built-in "rounded"
# style force-overwrites them with a reverse-video trick that renders as
# colour bleed around the pill caps in most terminals
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
# "terminal" = transparent. Do NOT use "none": tmux won't render the
# "fg=none" styles catppuccin generates from it, breaking the rounded tab caps
set -g @catppuccin_status_background "terminal"

# Rounded pill caps drawn with explicit colours on a transparent background.
# Colours must match the segment they cap: text bg (left) and number bg (right),
# per catppuccin's defaults for inactive/current windows.
set -g @catppuccin_window_left_separator "#[fg=#{@thm_surface_0},bg=terminal]"
set -g @catppuccin_window_right_separator "#[fg=#{@thm_overlay_2},bg=terminal]"
set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_surface_1},bg=terminal]"
set -g @catppuccin_window_current_right_separator "#[fg=#{@thm_mauve},bg=terminal]"
set -g @catppuccin_window_middle_separator " "

# Round off the right edge of the status modules too (v2's default is square)
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "no"

# Load catppuccin here (not just via TPM) so its colours and status modules
# exist before the status-right lines below are evaluated
run ~/.tmux/plugins/tmux/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
